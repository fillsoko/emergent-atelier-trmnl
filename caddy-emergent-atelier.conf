# Set TRMNL_DOMAIN and CADDY_PROXY_SECRET env vars before loading Caddy, e.g.:
#   export TRMNL_DOMAIN=emergent-atelier.filipsokolowski.com
#   export CADDY_PROXY_SECRET=$(openssl rand -hex 32)   # same value as in .env
{$TRMNL_DOMAIN} {
    header Strict-Transport-Security "max-age=31536000; includeSubDomains"
    reverse_proxy localhost:8001 {
        # Inject proxy-secret header so the app can verify requests came through Caddy.
        # Set REQUIRE_PROXY_SECRET=true in .env to enforce this check (SOK-202).
        header_up X-Proxy-Secret {$CADDY_PROXY_SECRET}
        # Replace X-Forwarded-For with just the real client IP (SOK-230).
        # This prevents clients from spoofing the header to bypass rate limits.
        header_up X-Forwarded-For {remote_host}
    }
}
