name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Mondays at 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  pip-audit:
    name: Dependency CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies (fail on high/critical)
        run: pip-audit -r requirements-lock.txt --fail-on-severity high

      - name: Audit dependencies (report medium, non-blocking)
        run: pip-audit -r requirements-lock.txt --fail-on-severity medium || true
