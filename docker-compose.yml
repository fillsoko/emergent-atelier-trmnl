version: "3.9"

services:
  emergent-atelier:
    build: .
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./data:/app/data           # Persist canvas history
      - ./configs:/app/configs     # Live-reload agent configs (restart required)
    environment:
      - PYTHONUNBUFFERED=1
      # Required secrets — generate with: openssl rand -hex 32
      - CYCLE_SECRET=${CYCLE_SECRET}
      # TRMNL marketplace credentials — set these after creating the plugin at
      # https://trmnl.com/plugins/my/new
      - TRMNL_CLIENT_ID=${TRMNL_CLIENT_ID:-}
      - TRMNL_CLIENT_SECRET=${TRMNL_CLIENT_SECRET:-}
      # Public base URL of this server (no trailing slash)
      # e.g. https://emergent-atelier.yourdomain.com
      - TRMNL_PUBLIC_URL=${TRMNL_PUBLIC_URL:-https://your-domain.example.com}
    restart: unless-stopped
