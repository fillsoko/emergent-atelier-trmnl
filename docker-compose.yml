version: "3.9"

services:
  emergent-atelier:
    build: .
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./data:/app/data           # Persist canvas history
      - ./configs:/app/configs     # Live-reload agent configs (restart required)
    environment:
      - PYTHONUNBUFFERED=1
      # Required secrets — generate with: openssl rand -hex 32
      - CYCLE_SECRET=${CYCLE_SECRET}
      # TRMNL marketplace credentials — set these after creating the plugin at
      # https://trmnl.com/plugins/my/new
      - TRMNL_CLIENT_ID=${TRMNL_CLIENT_ID:-}
      - TRMNL_CLIENT_SECRET=${TRMNL_CLIENT_SECRET}
      # Public base URL of this server (no trailing slash)
      # e.g. https://emergent-atelier.yourdomain.com
      - TRMNL_PUBLIC_URL=${TRMNL_PUBLIC_URL:-https://your-domain.example.com}
      # CORS allowed origins (comma-separated). Override for staging/dev environments.
      # Production default: emergentatelier.dev only
      - CORS_ORIGINS=${CORS_ORIGINS:-https://emergentatelier.dev,https://www.emergentatelier.dev}
      # Encryption key for the installation store (user PII at rest). REQUIRED.
      # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      - TRMNL_STORE_KEY=${TRMNL_STORE_KEY:?TRMNL_STORE_KEY is required. Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"}
      # Shared secret between Caddy and the app (proxy guard).
      # Generate with: openssl rand -hex 32
      # Set in Caddy config: header_up X-Proxy-Secret <value>
      # REQUIRE_PROXY_SECRET defaults to true — set to false only in local dev.
      - CADDY_PROXY_SECRET=${CADDY_PROXY_SECRET:-}
      - REQUIRE_PROXY_SECRET=${REQUIRE_PROXY_SECRET:-true}
      # HTTP Basic Auth password for dashboard + internal API endpoints (optional, recommended).
      # Generate with: openssl rand -hex 32
      - DASHBOARD_SECRET=${DASHBOARD_SECRET:-}
    restart: unless-stopped
